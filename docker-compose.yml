version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${SERVER_IP}:${BACKEND_PORT}:8080"
    environment:
      - GIN_MODE=release
      - ENV=${ENV}
    networks:
      - load-platform
    restart: unless-stopped
    # Убираем docker.sock если не нужен
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${SERVER_IP}:${FRONTEND_PORT}:80"
    environment:
      - REACT_APP_API_URL=http://${DOMAIN}:${BACKEND_PORT}
      - REACT_APP_WS_URL=ws://${DOMAIN}:${BACKEND_PORT}
    depends_on:
      - backend
    networks:
      - load-platform
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${SERVER_IP}:${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=http://${DOMAIN}:${PROMETHEUS_PORT}'
    networks:
      - load-platform
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${SERVER_IP}:${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://${DOMAIN}:${GRAFANA_PORT}
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - load-platform
    restart: unless-stopped

networks:
  load-platform:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
